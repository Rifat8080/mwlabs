# PostgreSQL. Supported versions are 9.3 and up.
# Install the pg gem:
#   gem install pg
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV["POSTGRES_USER"] %>
  password: <%= ENV["POSTGRES_PASSWORD"] %>
  host: <%= ENV["POSTGRES_HOST"] %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DATABASE", "mwlabs_development") %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_TEST_DATABASE", "mwlabs_test") %>


production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>

  cache:
    <<: *default
    url: <%= ENV.fetch("DATABASE_CACHE_URL", ENV["DATABASE_URL"]) %>
    migrations_paths: db/cache_migrate

  queue:
    <<: *default
    url: <%= ENV.fetch("DATABASE_QUEUE_URL", ENV["DATABASE_URL"]) %>
    migrations_paths: db/queue_migrate

  cable:
    <<: *default
    url: <%= ENV.fetch("DATABASE_CABLE_URL", ENV["DATABASE_URL"]) %>
    migrations_paths: db/cable_migrate
